<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Sharp</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/e865365090.js" crossorigin="anonymous"></script>
    
</head>
<body>
    <section id="landing">
        <nav>
            <figure>
                <img id="personal-logo" src="./as-assets/logo2.png" alt="">

            <ul class="nav__link--list">
                <li class="nav__link">
                    <a href="#"
                    class="

                    link__hover-effect 
                    link__hover-effect--black

                </li>
                <li class="nav__link">
                    <a href="#projects" class="
                    nav__link--anchor 
                    link__hover-effect 
                    link__hover-effect--black
                    " >Projects</a>
                </li>
                <li class="nav__link">
                    <a href="#contact" class="
                    nav__link--anchor

                <li>

                <div class="social__list">

                    </a>

                    </a>
                    <a href="./as-assets/Example Resume.pdf" target="_blank" class="social__link click">

        <button class="mail__btn click">
            <i class="fa-solid fa-envelope"></i>
        </button>
        <a href="#projects" class="scroll">
            <div class="scroll__icon click"></div>
        </a>
